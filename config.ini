[colors]
background = #102235
foreground = #E0ECF5
primary = #3A6EA5
secondary = #4F8CC9
alert = #C94F4F
active-bg = #FFFFFF
active-fg = #102235
separator = #1E3A56

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28
offset-x = 0
offset-y = 0

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0
line-size = 0

border-size = 0

padding-left = 1
padding-right = 1
module-margin-left = 0
module-margin-right = 0

font-0 = JetBrains Mono:size=10;3
font-1 = JetBrains Mono:size=10:weight=bold;3

modules-left = i3
modules-center = date
modules-right = sep cpu sep memory sep battery tray

separator =
dim-value = 1.0

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-background = ${colors.background}
tray-padding = 4

cursor-click = pointer

wm-restack = i3
override-redirect = false

[module/i3]
type = internal/i3

pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.primary}
label-mode-foreground = ${colors.foreground}

; Active / focused workspace
label-focused = %name%
label-focused-background = ${colors.active-bg}
label-focused-foreground = ${colors.active-fg}
label-focused-padding = 2

; Visible but unfocused (multi-monitor)
label-visible = %name%
label-visible-background = ${colors.background}
label-visible-foreground = ${colors.foreground}
label-visible-padding = 2

; Inactive workspace
label-unfocused = %name%
label-unfocused-background = ${colors.background}
label-unfocused-foreground = ${colors.foreground}
label-unfocused-padding = 2

; Workspace with urgency hint
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.foreground}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1

date = %a %b %d
time = %H:%M

label = " %date%  %time% "
label-foreground = ${colors.foreground}
label-background = ${colors.background}

[module/cpu]
type = internal/cpu
interval = 2

format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 2

label = CPU %percentage%%

[module/memory]
type = internal/memory
interval = 2

format = <label>
format-background = ${colors.background}
format-foreground = ${colors.foreground}
format-padding = 2

label = MEM %percentage_used%%

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98

format-charging = <label-charging>
format-charging-background = ${colors.background}
format-charging-foreground = ${colors.foreground}
format-charging-padding = 2

format-discharging = <label-discharging>
format-discharging-background = ${colors.background}
format-discharging-foreground = ${colors.foreground}
format-discharging-padding = 2

format-full = <label-full>
format-full-background = ${colors.background}
format-full-foreground = ${colors.foreground}
format-full-padding = 2

label-charging = BAT %percentage%%+
label-discharging = BAT %percentage%%
label-full = BAT FULL

[module/sep]
type = custom/text
content = "|"
content-foreground = ${colors.separator}
content-padding = 0

[module/tray]
type = internal/tray
tray-spacing = 4
tray-padding = 2
tray-size = 16
tray-background = ${colors.background}

[settings]
screenchange-reload = true

[global/wm]
margin-top = 0
margin-bottom = 0
